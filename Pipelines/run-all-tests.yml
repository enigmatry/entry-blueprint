trigger: none

jobs:
  - job: 'run_all_dotnet_tests'
    displayName: 'run all tests'
    timeoutInMinutes: 0
    pool:
      vmImage: 'ubuntu-22.04'
    steps:
      - task: DotNetCoreCLI@2
        displayName: Build solution
        inputs:
          command: 'build'
          projects: '**/*.sln'
          arguments: '/p:WarningsNotAsErrors=IDE0055'

      - task: DotNetCoreCLI@2
        displayName: Run all tests
        inputs:
          command: 'test'
          projects: '**/*.Tests.csproj'
          arguments: '--no-build --collect "XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*.Data.Migrations]*'
        